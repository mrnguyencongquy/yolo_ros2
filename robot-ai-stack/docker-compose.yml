services:

  ros2:
    build:
      context: ./ros2
    container_name: ros2_node
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      # Cô lập ROS2 graph trong máy — tránh merge với node ROS2 khác trên LAN
      # (vd Jetson cùng ROS_DOMAIN_ID=0) gây nhận nhầm tile/ảnh cũ.
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - YOLO_ZMQ_PORT=5555
      - SAMPLE_DIR=/images
      # Lưu đè kết quả mới nhất vào ./shared/output/latest_segments.json.
      - RESULT_SAVE=${RESULT_SAVE:-1}
      - RESULT_FORMAT=${RESULT_FORMAT:-both}
      - RESULT_DIR=/output
    volumes:
      - ./shared/images:/images
      - ./shared/output:/output
    stdin_open: true
    tty: true

  yolo:
    build:
      context: ./yolo
    container_name: yolo_detector
    network_mode: host
    environment:
      - YOLO_ZMQ_PORT=5555
      - YOLO_MODEL=/app/models/yolo26n-seg.pt
    volumes:
      - ./shared/images:/images
      - ./models:/models
    depends_on:
      - ros2
